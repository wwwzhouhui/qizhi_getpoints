[settings]
# 浏览器设置
browser_timeout = 120000

# 视频录制设置
enable_video_recording = false
video_output_dir = ./recordings

# 定时执行设置
# 是否启用定时执行模式（true/false）
auto_execute_enabled = false
# 执行间隔：24小时+10分钟
# 格式：HH:MM （24小时制）
execute_interval = 24:10
# 是否在程序启动时立即执行一次（true/false）
execute_on_startup = true


